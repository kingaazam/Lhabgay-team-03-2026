<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Navigation - Lhabgay E-Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            transition: all 0.3s;
            color: #333;
        }

        .back-btn:hover {
            background: #e0e0e0;
            transform: translateX(-5px);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .nav-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border: 2px solid #e9ecef;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .nav-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .nav-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile .nav-title { color: #2563eb; }
        .about .nav-title { color: #7c3aed; }
        .contact .nav-title { color: #0f766e; }
        .logout .nav-title { color: #b91c1c; }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            color: #6c757d;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            .button-grid {
                gap: 15px;
            }
            .nav-card {
                padding: 20px 15px;
            }
            .nav-icon {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" id="backToHomeBtn">
            ← Back to Home
        </button>
        
        <h1>Menu</h1>
        <div class="subtitle">Select where you'd like to go</div>
        
        <div class="button-grid">
            <div class="nav-card profile" id="profileCard">
                <div class="nav-icon">👤</div>
                <div class="nav-title">Profile</div>
                <div class="nav-desc">View your account</div>
            </div>
            
            <div class="nav-card about" id="aboutCard">
                <div class="nav-icon">📖</div>
                <div class="nav-title">About Us</div>
                <div class="nav-desc">Learn about us</div>
            </div>
            
            <div class="nav-card contact" id="contactCard">
                <div class="nav-icon">📧</div>
                <div class="nav-title">Contact Us</div>
                <div class="nav-desc">Get in touch</div>
            </div>
            
            <div class="nav-card logout" id="logoutCard">
                <div class="nav-icon">🚪</div>
                <div class="nav-title">Log Out</div>
                <div class="nav-desc">Exit session</div>
            </div>
        </div>
        
        <div class="footer">
            ⚡ Lhabgay E-Library Navigation System
        </div>
    </div>
    
    <div id="toast" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 50px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000;"></div>
    
    <script>
        const toast = document.getElementById('toast');
        
        function showToast(message) {
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }
        
        // DIRECT NAVIGATION FUNCTIONS
        function goToHome() {
            console.log('Going to home.html');
            showToast('🏠 Returning to Home...');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 100);
        }
        
        function goToProfile() {
            console.log('Going to profile.html');
            showToast('👤 Going to Profile...');
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 100);
        }
        
        function goToAbout() {
            console.log('Going to about.html');
            showToast('ℹ️ Going to About Us...');
            setTimeout(() => {
                window.location.href = 'about.html';
            }, 100);
        }
        
        function goToContact() {
            console.log('Going to contact.html');
            showToast('📧 Going to Contact Us...');
            setTimeout(() => {
                window.location.href = 'contact.html';
            }, 100);
        }
        
        // FIXED LOGOUT DESTINATION PATH (Changed from index.html to Login.html)
        function goToLogout() {
            console.log('Redirecting to Login.html');
            showToast('🚪 Logging out...');
            setTimeout(() => {
                window.location.href = 'Login.html';
            }, 100);
        }
        
        // Add event listeners
        document.getElementById('backToHomeBtn').addEventListener('click', goToHome);
        document.getElementById('profileCard').addEventListener('click', goToProfile);
        document.getElementById('aboutCard').addEventListener('click', goToAbout);
        document.getElementById('contactCard').addEventListener('click', goToContact);
        document.getElementById('logoutCard').addEventListener('click', goToLogout);
        
        // Keyboard accessibility
        const cards = document.querySelectorAll('.nav-card, .back-btn');
        cards.forEach(card => {
            card.setAttribute('tabindex', '0');
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    card.click();
                }
            });
        });
        
        console.log('✅ Navigation page ready');
        console.log('Current location:', window.location.pathname);
    </script>
</body>
</html>
