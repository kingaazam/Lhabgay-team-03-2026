<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lhabgay Signup</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-color: linear-gradient(135deg, #667eea, #764ba2);
        --text-color: #1a1a2e;
        --card-bg: #ffffff;
        --input-border: #e9ecef;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        transition:
          background 0.3s ease,
          color 0.3s ease;
      }

      body {
        background: var(--bg-color);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
      }

      .login-container {
        background: var(--card-bg);
        padding: 40px 30px;
        border-radius: 30px;
        width: 100%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }

      /* FIX: Updated LHABGAY Brand Logo */
      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: 3px;

        /* Matching the Login Page Gradient */
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        background-clip: text; /* Fixes the yellow mark in VS Code */
        -webkit-text-fill-color: transparent;

        display: inline-block;
      }

      h2 {
        color: var(--text-color);
        margin-bottom: 8px;
        font-size: 1.5rem;
      }

      .subtitle {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 25px;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 50px;
        border: 2px solid var(--input-border);
        margin-bottom: 15px;
        font-size: 0.95rem;
        outline: none;
      }

      input:focus {
        border-color: #667eea;
      }

      .btn-solid {
        width: 100%;
        padding: 14px;
        border-radius: 50px;
        border: none;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        margin-top: 5px;
        transition: transform 0.2s;
      }

      .btn-solid:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }

      .footer-links {
        margin-top: 18px;
        font-size: 0.9rem;
      }

      .footer-links a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>LHABGAY</h1>
      <h2>Create Account</h2>
      <p class="subtitle">Sign up to start your reading journey</p>

      <form id="signupForm" onsubmit="signup(event)">
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="email" id="email" placeholder="Email Address" required />
        <input type="password" id="password" placeholder="Password" required />
        <input
          type="password"
          id="confirm"
          placeholder="Confirm Password"
          required
        />

        <button type="submit" class="btn-solid">
          <i class="fas fa-user-plus"></i> Sign Up
        </button>
      </form>

      <div class="footer-links">
        <a href="Login.html">Already have an account? Login</a>
      </div>
    </div>

    <script>
      function signup(event) {
        event.preventDefault();
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const confirm = document.getElementById("confirm").value.trim();

        if (password !== confirm) {
          alert("Passwords do not match!");
          return;
        }

        let users = JSON.parse(localStorage.getItem("users")) || [];
        const exists = users.find((u) => u.email === email);

        if (exists) {
          alert("Account already exists!");
          return;
        }

        users.push({ name, email, password });
        localStorage.setItem("users", JSON.stringify(users));

        alert("Signup successful! Redirecting to login...");
        window.location.href = "login.html";
      }
      // Backend signup handler. This overrides the old localStorage demo flow.
      window.signup = async function (event) {
        event.preventDefault();
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const confirm = document.getElementById("confirm").value.trim();

        if (password !== confirm) {
          alert("Passwords do not match!");
          return;
        }

        try {
          const response = await fetch("/user/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password }),
          });
          const data = await response.json();

          if (!response.ok) {
            alert(data.error || "Signup failed");
            return;
          }

          alert("Account created successfully");
          window.location.href = "Login.html";
        } catch (error) {
          console.error(error);
          alert("Could not connect to server");
        }
      };
    </script>
  </body>
</html>
