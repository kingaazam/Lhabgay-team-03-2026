<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Book Details - Lhabgay E-Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .detail-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: 18px;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        .detail-header h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .detail-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .book-hero {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
        }
        .book-cover-section {
            flex: 1.2;
            min-width: 220px;
            background: linear-gradient(145deg, #f8f9fc, #f1f3f8);
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .book-cover-img {
            width: 100%;
            max-width: 260px;
            border-radius: 20px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            object-fit: cover;
            aspect-ratio: 2/3;
        }
        .book-cover-img:hover {
            transform: scale(1.02);
        }
        .book-info-section {
            flex: 2;
            padding: 28px 28px 28px 20px;
        }
        .book-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .book-author {
            font-size: 1rem;
            color: #667eea;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .author-name {
            background: #ede9fe;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .genre-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #5b48b0;
            margin-bottom: 18px;
        }
        .rating-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stars {
            color: #ffb800;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }
        .rating-value {
            background: #2d3748;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .book-description {
            color: #334155;
            line-height: 1.6;
            margin: 20px 0;
            font-size: 0.95rem;
            border-left: 3px solid #667eea;
            padding-left: 18px;
            background: #f8fafc;
            border-radius: 0 12px 12px 0;
        }
        .book-meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            font-size: 0.8rem;
            color: #5b6e8c;
            flex-wrap: wrap;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            padding: 5px 12px;
            border-radius: 30px;
        }
        .meta-item i {
            color: #667eea;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 28px;
        }
        .btn-read {
            flex: 2;
            background: linear-gradient(95deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
        }
        .btn-read:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102,126,234,0.4);
        }
        .btn-bookmark, .btn-download {
            background: white;
            border: 1.5px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #334155;
        }
        .btn-bookmark i, .btn-download i {
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .btn-bookmark:hover {
            background: #fef9c3;
            border-color: #eab308;
            color: #b45309;
        }
        .btn-download:hover {
            background: #dcfce7;
            border-color: #22c55e;
            color: #15803d;
        }
        .btn-bookmark.active {
            background: #fef3c7;
            border-color: #f59e0b;
            color: #d97706;
        }
        .btn-bookmark.active i {
            font-weight: 900;
        }

        .toast-message {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        @media (max-width: 640px) {
            .toast-message { white-space: normal; width: 80%; text-align: center; font-size: 0.75rem; }
            .book-title { font-size: 1.4rem; }
            .book-hero { flex-direction: column; }
            .book-cover-section { padding: 25px; }
            .book-info-section { padding: 20px; }
            .action-buttons { flex-direction: column; }
            .btn-read, .btn-bookmark, .btn-download { justify-content: center; }
        }

        .loading-skeleton {
            text-align: center;
            padding: 60px;
            color: #667eea;
        }
        .error-message {
            background: #fee2e2;
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            margin: 40px 20px;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .pdf-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            overflow: auto;
        }
        .pdf-modal-content {
            position: relative;
            width: 95%;
            max-width: 1200px;
            margin: 20px auto;
            background: #f1f1f1;
            border-radius: 16px;
            overflow: hidden;
        }
        .pdf-modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .close-modal {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 20px;
        }
        .close-modal:hover {
            background: rgba(255,255,255,0.4);
        }
        .pdf-iframe {
            width: 100%;
            height: 80vh;
            border: none;
        }
        @media (max-width: 768px) {
            .pdf-iframe { height: 70vh; }
        }
    </style>
</head>
<body>

<header class="detail-header">
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </button>
    <h1><i class="fas fa-book-open"></i> Book Details</h1>
</header>

<main class="detail-container" id="bookDetails">
    <div class="loading-skeleton" id="loadingState">
        <i class="fas fa-spinner fa-pulse fa-2x"></i>
        <p>Loading book magic...</p>
    </div>
</main>

<footer>
    <p>📖 Lhabgay E-Library — Read anywhere, anytime</p>
</footer>

<div id="toastMsg" class="toast-message"></div>

<div id="pdfModal" class="pdf-modal">
    <div class="pdf-modal-content">
        <div class="pdf-modal-header">
            <h3><i class="fas fa-file-pdf"></i> Reading: War and Peace</h3>
            <button class="close-modal" onclick="closePDFModal()"><i class="fas fa-times"></i></button>
        </div>
        <iframe id="pdfIframe" class="pdf-iframe" src=""></iframe>
    </div>
</div>

<script>
    // ==============================================
    // BOOKMARKS STORAGE - MUST MATCH BOOKMARKS PAGE
    // ==============================================
    const BOOKMARKS_STORAGE_KEY = 'lhabgay_userBookmarks';
    
    // Get current bookmarks from localStorage
    function getBookmarks() {
        const saved = localStorage.getItem(BOOKMARKS_STORAGE_KEY);
        if (saved) {
            return JSON.parse(saved);
        }
        return [];
    }
    
    // Save bookmarks array
    function saveBookmarks(bookmarks) {
        localStorage.setItem(BOOKMARKS_STORAGE_KEY, JSON.stringify(bookmarks));
    }
    
    // Check if a book is bookmarked
    function isBookmarked(bookId) {
        const bookmarks = getBookmarks();
        return bookmarks.some(book => book.id === bookId);
    }
    
    // Add book to bookmarks
    function addBookmark(book) {
        const bookmarks = getBookmarks();
        // Check if already exists
        if (!bookmarks.some(b => b.id === book.id)) {
            const bookmarkItem = {
                id: book.id,
                title: book.title,
                author: book.author,
                category: book.category,
                rating: book.rating,
                image: book.image
            };
            bookmarks.push(bookmarkItem);
            saveBookmarks(bookmarks);
            return true;
        }
        return false;
    }
    
    // Remove book from bookmarks
    function removeBookmark(bookId) {
        let bookmarks = getBookmarks();
        bookmarks = bookmarks.filter(book => book.id !== bookId);
        saveBookmarks(bookmarks);
    }
    
    // Toggle bookmark
    function toggleBookmark(book) {
        if (isBookmarked(book.id)) {
            removeBookmark(book.id);
            return false;
        } else {
            addBookmark(book);
            return true;
        }
    }

    // ==============================================
    // PDF Generation
    // ==============================================
    let generatedPdfBlob = null;

    async function generateRealPDF(book) {
        return new Promise((resolve) => {
            const checkInterval = setInterval(() => {
                if (window.jspdf) {
                    clearInterval(checkInterval);
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                    
                    doc.setFontSize(28);
                    doc.setFont('helvetica', 'bold');
                    doc.text(book.title, 105, 60, { align: 'center' });
                    
                    doc.setFontSize(16);
                    doc.setFont('helvetica', 'normal');
                    doc.text(`by ${book.author}`, 105, 85, { align: 'center' });
                    
                    doc.setFontSize(12);
                    doc.text(`First published: ${book.year || '1869'}`, 105, 110, { align: 'center' });
                    doc.text(`Pages: ${book.pages || '1225'}`, 105, 125, { align: 'center' });
                    
                    doc.addPage();
                    doc.setFontSize(18);
                    doc.setFont('helvetica', 'bold');
                    doc.text("About This Book", 20, 30);
                    
                    doc.setFontSize(11);
                    doc.setFont('helvetica', 'normal');
                    const splitDesc = doc.splitTextToSize(book.description || "A timeless masterpiece.", 170);
                    doc.text(splitDesc, 20, 50);
                    
                    doc.addPage();
                    doc.setFontSize(14);
                    doc.setFont('helvetica', 'bold');
                    doc.text("Continue Reading...", 105, 50, { align: 'center' });
                    doc.setFontSize(11);
                    doc.setFont('helvetica', 'normal');
                    doc.text(`This digital edition contains "${book.title}"`, 105, 80, { align: 'center' });
                    doc.text(`one of the greatest works of world literature.`, 105, 95, { align: 'center' });
                    
                    resolve(doc.output('blob'));
                }
            }, 100);
            
            setTimeout(() => {
                if (!window.jspdf) {
                    const fallback = new Blob([`%PDF-1.4\n1 0 obj<</Type/Catalog/Pages 2 0 R>>\nendobj\n2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>\nendobj\n3 0 obj<</Type/Page/MediaBox[0 0 612 792]/Parent 2 0 R/Resources<<>>/Contents 4 0 R>>\nendobj\n4 0 obj<</Length 100>>\nstream\nBT /F1 24 Tf 100 700 Td (${book.title}) Tj\nBT /F1 12 Tf 100 670 Td (by ${book.author}) Tj\nendstream\nendobj\nxref\n0 5\n0000000000 65535 f\n0000000009 00000 n\n0000000058 00000 n\n0000000115 00000 n\n0000000222 00000 n\ntrailer<</Root 1 0 R>>\nstartxref\n322\n%%EOF`], { type: 'application/pdf' });
                    resolve(fallback);
                }
            }, 2000);
        });
    }

    async function savePDFToDevice(book) {
        showToast(`📄 Generating PDF for "${book.title}"...`);
        try {
            let pdfBlob;
            if (generatedPdfBlob) {
                pdfBlob = generatedPdfBlob;
            } else {
                pdfBlob = await generateRealPDF(book);
                generatedPdfBlob = pdfBlob;
            }
            const downloadUrl = URL.createObjectURL(pdfBlob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `${book.title.replace(/[^a-z0-9]/gi, '_')}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(downloadUrl);
            showToast(`✅ "${book.title}" saved to your device!`);
        } catch (err) {
            console.error(err);
            showToast("Failed to save PDF. Please try again.", true);
        }
    }

    async function openPDFForReading(book) {
        if (book.book_file_path) {
            // record activity then open the actual uploaded file
            recordReadingActivity(book.title || book.bookTitle || 'Unknown');
            window.open(book.book_file_path, '_blank');
            return;
        }
        showToast(`📖 Opening "${book.title}"...`);
        try {
            let pdfBlob;
            if (generatedPdfBlob) {
                pdfBlob = generatedPdfBlob;
            } else {
                pdfBlob = await generateRealPDF(book);
                generatedPdfBlob = pdfBlob;
            }
            // If generated modal reading is used, still record activity
            recordReadingActivity(book.title || book.bookTitle || 'Unknown');
            const pdfUrl = URL.createObjectURL(pdfBlob);
            const modal = document.getElementById('pdfModal');
            const iframe = document.getElementById('pdfIframe');
            iframe.src = pdfUrl;
            modal.style.display = 'block';
        } catch (err) {
            console.error(err);
            showToast("Could not open PDF. Please try again.", true);
        }
    }

    function closePDFModal() {
        const modal = document.getElementById('pdfModal');
        const iframe = document.getElementById('pdfIframe');
        iframe.src = '';
        modal.style.display = 'none';
    }

    // Record a reading activity into the streak storage
    function recordReadingActivity(bookTitle) {
        try {
            const STORAGE_KEY = 'lhabgay_streak_data';
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
            if (!data) {
                data = { currentStreak: 0, bestStreak: 0, totalDays: 0, checkedDates: [], readingLog: [] };
            }
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

            if (!data.checkedDates.includes(today)) {
                data.checkedDates.push(today);
                data.totalDays = (data.totalDays || 0) + 1;

                // Update streak count
                if (data.checkedDates.includes(yesterday)) {
                    data.currentStreak = (data.currentStreak || 0) + 1;
                } else {
                    data.currentStreak = 1;
                }
                if ((data.currentStreak || 0) > (data.bestStreak || 0)) data.bestStreak = data.currentStreak;
            }

            // Always add reading log entry (most recent first)
            data.readingLog = data.readingLog || [];
            data.readingLog.unshift({ date: today, bookTitle: bookTitle });

            // Keep log reasonable size
            if (data.readingLog.length > 200) data.readingLog.length = 200;

            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (err) {
            console.warn('Could not record reading activity', err);
        }
    }

    // ==============================================
    // Toast and UI Helpers
    // ==============================================
    function showToast(message, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = message;
        toast.style.backgroundColor = isError ? '#dc2626' : '#1f2937';
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 2800);
    }

    let currentBook = null;
    let currentBookmarkState = false;

    function loadBookDetails() {
        const container = document.getElementById('bookDetails') || document.getElementById('detailContainer');
        const loadingDiv = document.getElementById('loadingState');
        
        try {
            const storedBook = localStorage.getItem('selectedBook');
            if (storedBook) {
                currentBook = JSON.parse(storedBook);
            } else {
                // Fallback demo book
                currentBook = {
                    id: 1,
                    title: "War and Peace",
                    author: "Leo Tolstoy",
                    category: "fiction",
                    rating: 4.8,
                    description: "A timeless masterpiece exploring themes of love, war, fate, and free will during Napoleon's invasion of Russia.",
                    year: 1869,
                    pages: 1225,
                    image: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&h=600&fit=crop"
                };
            }
            
            currentBookmarkState = isBookmarked(currentBook.id);
            renderBookUI(currentBook);
            
            if (loadingDiv) loadingDiv.style.display = 'none';
            attachButtonEvents();
            
        } catch (error) {
            console.error(error);
            if (loadingDiv) loadingDiv.style.display = 'none';
            container.innerHTML = `<div class="error-message">
                <i class="fas fa-exclamation-triangle" style="font-size: 42px; color:#dc2626;"></i>
                <h3>Oops! Book details not found</h3>
                <button onclick="goBack()" style="margin-top:20px; background:#667eea; color:white; border:none; padding:10px 24px; border-radius:40px;">Go Home</button>
            </div>`;
        }
    }
    
    function renderBookUI(book) {
        const container = document.getElementById('bookDetails') || document.getElementById('detailContainer');
        if (!container) return;
        
        const fullStars = Math.floor(book.rating);
        const halfStar = book.rating % 1 >= 0.5;
        let starsHtml = '';
        for(let i = 0; i < fullStars; i++) starsHtml += '<i class="fas fa-star"></i>';
        if(halfStar) starsHtml += '<i class="fas fa-star-half-alt"></i>';
        for(let i = 0; i < 5 - Math.ceil(book.rating); i++) starsHtml += '<i class="far fa-star"></i>';
        
        const genreDisplay = book.category ? (book.category.charAt(0).toUpperCase() + book.category.slice(1)) : 'Classic';
        
        const html = `
            <div class="book-hero">
                <div class="book-cover-section">
                    <img class="book-cover-img" src="${book.image}" alt="${escapeHtml(book.title)}" onerror="this.src='https://via.placeholder.com/300x450/667eea/white?text=${escapeHtml(book.title)}'">
                </div>
                <div class="book-info-section">
                    <h1 class="book-title">${escapeHtml(book.title)}</h1>
                    <div class="book-author">
                        <i class="fas fa-user-pen"></i>
                        <span class="author-name">${escapeHtml(book.author)}</span>
                    </div>
                    <div class="genre-badge">
                        <i class="fas fa-tag"></i> ${escapeHtml(genreDisplay)}
                    </div>
                    <div class="rating-box">
                        <div class="stars">${starsHtml}</div>
                        <span class="rating-value">${book.rating} / 5</span>
                    </div>
                    <div class="book-description">
                        <i class="fas fa-quote-left" style="color:#667eea; margin-right:6px;"></i> 
                        ${escapeHtml(book.description)}
                    </div>
                    <div class="book-meta">
                        <div class="meta-item"><i class="fas fa-calendar-alt"></i> ${book.year || '1869'}</div>
                        <div class="meta-item"><i class="fas fa-file-alt"></i> ${book.pages || '1225'} pages</div>
                        <div class="meta-item"><i class="fas fa-globe"></i> Russian Literature</div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-read" id="readNowBtn"><i class="fas fa-book-reader"></i> Read Now</button>
                        <button class="btn-bookmark ${currentBookmarkState ? 'active' : ''}" id="bookmarkBtn">
                            <i class="fas ${currentBookmarkState ? 'fa-bookmark' : 'fa-bookmark'}"></i> 
                            ${currentBookmarkState ? 'Saved' : 'Bookmark'}
                        </button>
                        <button class="btn-download" id="saveDeviceBtn"><i class="fas fa-download"></i> Save to Device</button>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function attachButtonEvents() {
        const readBtn = document.getElementById('readNowBtn');
        const bookmarkBtn = document.getElementById('bookmarkBtn');
        const downloadBtn = document.getElementById('saveDeviceBtn');
        
        if (readBtn) {
            readBtn.addEventListener('click', () => openPDFForReading(currentBook));
        }
        if (bookmarkBtn) {
            bookmarkBtn.addEventListener('click', () => {
                const newState = toggleBookmark(currentBook);
                currentBookmarkState = newState;
                const btn = document.getElementById('bookmarkBtn');
                if (btn) {
                    if (newState) {
                        btn.classList.add('active');
                        btn.innerHTML = '<i class="fas fa-bookmark"></i> Saved';
                        showToast(`✨ "${currentBook.title}" added to bookmarks!`);
                    } else {
                        btn.classList.remove('active');
                        btn.innerHTML = '<i class="fas fa-bookmark"></i> Bookmark';
                        showToast(`Removed "${currentBook.title}" from bookmarks`);
                    }
                }
            });
        }
        if (downloadBtn) {
            downloadBtn.addEventListener('click', () => savePDFToDevice(currentBook));
        }
    }
    
    function goBack() {
        if (document.referrer && (document.referrer.includes('home.html') || document.referrer.includes('index'))) {
            window.history.back();
        } else {
            window.location.href = 'home.html';
        }
    }
    
    function normalizeServerBook(book) {
        return {
            id: book.id,
            title: book.title,
            author: book.author,
            category: (book.category || '').toLowerCase(),
            rating: book.rating || 5,
            description: book.description || '',
            year: book.created_at ? new Date(book.created_at).getFullYear() : '',
            pages: book.pages || '',
            image: book.cover_image_path || book.image,
            book_file_path: book.book_file_path ? (book.book_file_path.startsWith('/') ? book.book_file_path : `/${book.book_file_path}`) : ''
        };
    }

    // Backend detail loader. It reads details.html?id=BOOK_ID and calls /books/{id}.
    loadBookDetails = async function () {
        const container = document.getElementById('bookDetails') || document.getElementById('detailContainer');
        const loadingDiv = document.getElementById('loadingState');
        const params = new URLSearchParams(window.location.search);
        const bookId = params.get('id') || localStorage.getItem('lastViewBookId');

        if (!bookId) {
            if (loadingDiv) loadingDiv.style.display = 'none';
            container.innerHTML = `<div class="error-message">
                <i class="fas fa-exclamation-triangle" style="font-size: 42px; color:#dc2626;"></i>
                <h3>Book id is missing</h3>
                <button onclick="goBack()" style="margin-top:20px; background:#667eea; color:white; border:none; padding:10px 24px; border-radius:40px;">Go Home</button>
            </div>`;
            return;
        }

        let selectedBook = null;
        try {
            const response = await fetch(`/books/${bookId}`);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Book not found');
            currentBook = normalizeServerBook(data);
            localStorage.setItem('selectedBook', JSON.stringify(currentBook));
        } catch (error) {
            console.warn('Server fetch failed, falling back to selectedBook:', error);
            const storedBook = localStorage.getItem('selectedBook');
            if (storedBook) {
                selectedBook = JSON.parse(storedBook);
            }

            if (selectedBook && `${selectedBook.id}` === `${bookId}`) {
                currentBook = selectedBook;
            } else {
                if (loadingDiv) loadingDiv.style.display = 'none';
                container.innerHTML = `<div class="error-message">
                    <i class="fas fa-exclamation-triangle" style="font-size: 42px; color:#dc2626;"></i>
                    <h3>Oops! Book details not found</h3>
                    <button onclick="goBack()" style="margin-top:20px; background:#667eea; color:white; border:none; padding:10px 24px; border-radius:40px;">Go Home</button>
                </div>`;
                return;
            }
        }

        currentBookmarkState = isBookmarked(currentBook.id);
        renderBookUI(currentBook);
        if (loadingDiv) loadingDiv.style.display = 'none';
        attachButtonEvents();
    };

    savePDFToDevice = async function (book) {
        const safeTitle = (book.title || 'book')
            .replace(/[^\w\s-]/g, '')
            .trim()
            .replace(/\s+/g, '_');
        const fileName = `${safeTitle || 'book'}.pdf`;

        showToast(`📄 Preparing "${book.title}" for download...`);

        try {
            // If an uploaded file exists, try to download it first.
            if (book.book_file_path) {
                try {
                    const resp = await fetch(book.book_file_path, { credentials: 'same-origin' });
                    if (resp.ok) {
                        const blob = await resp.blob();
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        showToast(`✅ "${book.title}" downloaded`);
                        return;
                    }
                } catch (err) {
                    console.warn('Uploaded book download failed, falling back to generated PDF:', err);
                }
            }

            // If no book file path exists or download failed, generate a PDF from metadata.
            let pdfBlob;
            if (generatedPdfBlob) {
                pdfBlob = generatedPdfBlob;
            } else {
                pdfBlob = await generateRealPDF(book);
                generatedPdfBlob = pdfBlob;
            }

            const downloadUrl = URL.createObjectURL(pdfBlob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(downloadUrl);
            showToast(`✅ "${book.title}" saved to your device!`);
        } catch (err) {
            console.error(err);
            showToast('Failed to save PDF. Please try again.', true);
        }
    };

    window.addEventListener('DOMContentLoaded', () => {
        loadBookDetails();
    });
</script>
