<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Lhabgay Library</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, sans-serif;
      }

      :root {
        --sidebar-width: 260px;
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --bg-light: #f4f7fe;
      }

      body {
        background: var(--bg-light);
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar Styling */
      .sidebar {
        width: var(--sidebar-width);
        background: white;
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 0 10px rgba(0, 0, 0, 0.05);
        z-index: 100;
      }

      .logo-area {
        padding: 24px;
        font-size: 1.5rem;
        font-weight: bold;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        border-bottom: 1px solid #f4f7fe;
        text-align: center;
      }

      .nav-links {
        list-style: none;
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }

      .nav-links a {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 14px 24px;
        color: #6c757d;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s;
      }

      .nav-links li.active a,
      .nav-links a:hover {
        color: #764ba2;
        background: #f8f9fa;
        border-left: 4px solid #764ba2;
      }

      /* Main Content Layout */
      .main-content {
        margin-left: var(--sidebar-width);
        flex: 1;
        padding: 40px;
      }

      .top-navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 24px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: white;
        padding: 24px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.02);
      }

      .stat-info h3 {
        font-size: 1.8rem;
        color: #333;
        margin-bottom: 4px;
      }

      .stat-info p {
        color: #888;
        font-size: 14px;
      }

      .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }

      /* Data Tables */
      .table-container {
        background: white;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.02);
      }

      .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .btn-add {
        background: var(--primary-gradient);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      th,
      td {
        padding: 16px;
        border-bottom: 1px solid #eee;
      }

      th {
        color: #888;
        font-weight: 600;
        font-size: 14px;
      }

      .book-row img {
        width: 45px;
        height: 65px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }

      .btn-delete {
        background: #ffe3e3;
        color: #dc3545;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn-delete:hover {
        background: #dc3545;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="logo-area">LHABGAY</div>
      <ul class="nav-links">
        <li class="active">
          <a href="admin.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
        </li>
        <li>
          <a href="bookUpload.html"><i class="fas fa-book"></i> Upload Book</a>
        </li>
        <li>
          <a href="home.html"><i class="fas fa-home"></i> View Library</a>
        </li>
        <li style="margin-top: auto">
          <a href="index.html" style="color: #dc3545"
            ><i class="fas fa-sign-out-alt"></i> Logout</a
          >
        </li>
      </ul>
    </div>

    <div class="main-content">
      <div class="top-navbar">
        <h2>Dashboard Overview</h2>
        <div style="font-weight: 500; color: #555">Welcome, Admin</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-info">
            <h3 id="totalBooksCount">0</h3>
            <p>Total Books</p>
          </div>
          <div class="stat-icon" style="background: #4e73df">
            <i class="fas fa-book-open"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <h3 id="categoriesCount">0</h3>
            <p>Categories</p>
          </div>
          <div class="stat-icon" style="background: #1cc88a">
            <i class="fas fa-tags"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <h3>Active</h3>
            <p>Sandbox Status</p>
          </div>
          <div class="stat-icon" style="background: #f6c23e">
            <i class="fas fa-shield-alt"></i>
          </div>
        </div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <h3>Recently Uploaded Books</h3>
          <a href="bookUpload.html" class="btn-add">
            <i class="fas fa-plus"></i> Add New Book
          </a>
        </div>
        <table>
          <thead>
            <tr>
              <th>Cover</th>
              <th>Title</th>
              <th>Author</th>
              <th>ISBN</th>
              <th>Category</th>
              <th>Date Added</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="booksTableBody">
            </tbody>
        </table>
      </div>
    </div>

    <script>
      function normalizeBook(book) {
  return {
    id: book.id,
    title: book.title || "Untitled",
    author: book.author || "Unknown Author",
    isbn: book.isbn || "N/A",
    category: book.category || "General",
    dateAdded: book.created_at
      ? new Date(book.created_at).toLocaleDateString()
      : book.dateAdded || "Recent",
    // CHANGE THIS LINE BELOW: Use book.cover_image instead of cover_image_path
    image: book.cover_image
      ? `/book/${book.cover_image}`
      : book.image || "https://via.placeholder.com/120x170?text=No+Cover",
  };
}
      async function loadBooks() {
        const booksTableBody = document.getElementById("booksTableBody");
        const totalBooksCount = document.getElementById("totalBooksCount");
        const categoriesCount = document.getElementById("categoriesCount");

        booksTableBody.innerHTML = "";

        let library = [];

        try {
          const response = await fetch("/books", { cache: "no-store" });
          if (!response.ok) {
            throw new Error("Could not load books from server");
          }
          const serverBooks = await response.json();
          library = Array.isArray(serverBooks)
            ? serverBooks.map(normalizeBook)
            : [];
        } catch (error) {
          console.warn("Server fetch failed, falling back to local storage:", error);
          library = JSON.parse(localStorage.getItem("lhabgay_allBooks")) || [];
        }

        if (library.length === 0) {
          booksTableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#999; padding:30px;">No books found.</td></tr>`;
          totalBooksCount.textContent = "0";
          categoriesCount.textContent = "0";
          return;
        }

        totalBooksCount.textContent = library.length;
        const uniqueCategories = [
          ...new Set(library.map((book) => book.category).filter(Boolean)),
        ];
        categoriesCount.textContent = uniqueCategories.length;

        library.forEach((book) => {
          const row = document.createElement("tr");
          row.className = "book-row";

          row.innerHTML = `
                    <td><img src="${book.image}" alt="Cover" onerror="this.src='https://via.placeholder.com/120x170?text=No+Cover'"></td>
                    <td><strong>${book.title}</strong></td>
                    <td>${book.author}</td>
                    <td><code style="background:#f0f0f0; padding:2px 6px; border-radius:4px;">${book.isbn}</code></td>
                    <td><span style="background:#eee; padding:4px 8px; border-radius:30px; font-size:12px;">${book.category}</span></td>
                    <td>${book.dateAdded}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteBook(${book.id})">
                            <i class="fas fa-trash-alt"></i> Delete
                        </button>
                    </td>
                `;
          booksTableBody.appendChild(row);
        });
      }

      function deleteBook(bookId) {
        if (confirm("Are you sure you want to remove this book?")) {
          let library = JSON.parse(localStorage.getItem("lhabgay_allBooks")) || [];
          library = library.filter((book) => book.id !== bookId);
          localStorage.setItem("lhabgay_allBooks", JSON.stringify(library));
          loadBooks();
        }
      }

      window.onload = loadBooks;
    </script>
  </body>
</html>
