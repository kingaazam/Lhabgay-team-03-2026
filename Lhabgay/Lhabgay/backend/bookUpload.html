<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Upload Book | Lhabgay Library</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .upload-container {
        background: white;
        width: 100%;
        max-width: 550px;
        padding: 35px;
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      }

      .header {
        text-align: center;
        margin-bottom: 25px;
      }
      .header h2 {
        color: #333;
      }

      .form-row {
        display: flex;
        gap: 15px;
      }

      .form-group {
        margin-bottom: 18px;
        flex: 1;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #f1f3f5;
        border-radius: 12px;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        border-color: #667eea;
        background: #fff;
      }

      /* Custom File Upload Styling */
      .file-upload-box {
        border: 2px dashed #cbd5e0;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        cursor: pointer;
        color: #718096;
        transition: all 0.3s;
      }
      .file-upload-box:hover {
        border-color: #667eea;
        background: #f8f9ff;
        color: #667eea;
      }
      #cover_image {
        display: none;
      }

      .btn-submit {
        width: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
      }

      #imagePreview {
        width: 120px;
        height: 170px;
        object-fit: cover;
        margin: 15px auto 0;
        display: none;
        border-radius: 8px;
        border: 2px solid #eee;
      }

      .back-btn {
        display: block;
        text-align: center;
        margin-top: 20px;
        text-decoration: none;
        color: #764ba2;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }

      /* In-Layout Notification Banner (Toast) */
      .toast-message {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #333;
        color: white;
        padding: 14px 28px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 500;
        z-index: 10000;
        opacity: 0;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="upload-container">
      <div class="header">
        <h2>Admin Library Management</h2>
        <p style="color: #888; font-size: 13px">
          Add books to the Lhabgay Collection
        </p>
      </div>

      <form id="uploadForm">
        <div class="form-group">
          <label>Book Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="Enter title"
            required
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Author Name</label>
            <input
              type="text"
              id="author"
              name="author"
              placeholder="e.g. J.K. Rowling"
              required
            />
          </div>
          <div class="form-group">
            <label>ISBN</label>
            <input
              type="text"
              id="bookISBN"
              placeholder="13-digit code"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="category" name="category" required>
            <option value="" disabled selected>Select Category</option>
            <option value="Fiction">Fiction</option>
            <option value="Non-Fiction">Non-Fiction</option>
            <option value="Education">Education</option>
            <option value="Science">Science</option>
            <option value="History">History</option>
          </select>
        </div>

        <div class="form-group">
          <label>Short Description</label>
          <textarea
            id="description"
            name="description"
            rows="3"
            placeholder="Write a brief summary..."
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label>Book Cover Image</label>
          <label for="cover_image" class="file-upload-box" id="dropZone">
            <i class="fas fa-image fa-2x"></i><br />
            <span>Click to upload cover image</span>
            <input type="file" id="cover_image" name="cover_image" accept="image/*" required />
          </label>
          <img id="imagePreview" alt="Book Cover Preview" />
        </div>

        <div class="form-group">
          <label>Book File (PDF)</label>
          <input type="file" id="book_file" name="book_file" accept=".pdf" required />
        </div>

        <button type="submit" class="btn-submit">Add Book to Library</button>
      </form>

      <a href="admin.html" class="back-btn"
        ><i class="fas fa-arrow-left"></i> Back to Dashboard</a
      >
    </div>

    <div id="toastMsg" class="toast-message"></div>

    <script>
      const fileInput = document.getElementById("cover_image");
      const preview = document.getElementById("imagePreview");
      const dropZone = document.getElementById("dropZone");
      let base64Image = "";

      // Track selected document name across fallback conversions 
      let base64BookFile = "";
      document.getElementById("book_file").addEventListener("change", function() {
        const file = this.files[0];
        if (file && file.type !== "application/pdf") {
          // Extra frontend guard against non-PDF uploads
          showToast("⚠️ Selected document must be a PDF file.", true);
          this.value = "";
        }
      });

      function showToast(message, isError = false) {
        const toast = document.getElementById("toastMsg");
        toast.textContent = message;
        toast.style.backgroundColor = isError ? "#dc2626" : "#2e7d32"; 
        toast.style.opacity = "1";
        
        setTimeout(() => {
          toast.style.opacity = "0";
        }, 3000);
      }

      fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            base64Image = e.target.result;
            preview.src = base64Image;
            preview.style.display = "block";
            dropZone.querySelector("span").innerText =
              "Image Selected: " + file.name;
          };
          reader.readAsDataURL(file);
        }
      });

      document
        .getElementById("uploadForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          if (!fileInput.files[0]) {
            showToast("⚠️ Please upload a cover image first.", true);
            return;
          }

          const bookFile = document.getElementById("book_file").files[0];
          if (!bookFile) {
            showToast("⚠️ Please upload the book file.", true);
            return;
          }

          const titleVal = document.getElementById("title").value.trim();
          const authorVal = document.getElementById("author").value.trim();
          const isbnVal = document.getElementById("bookISBN").value.trim();
          const categoryVal = document.getElementById("category").value;
          const descriptionVal = document.getElementById("description").value.trim();

          const formData = new FormData();
          formData.append("title", titleVal);
          formData.append("author", authorVal);
          formData.append("isbn", isbnVal);
          formData.append("description", descriptionVal);
          formData.append("category", categoryVal);
          formData.append("cover_image", fileInput.files[0]);
          
          // FIX: We pass BOTH key naming systems so Go can catch either key successfully!
          formData.append("book_file", bookFile);
          formData.append("bookFile", bookFile);
          formData.append("file", bookFile);

          try {
            const response = await fetch("/admin/books/upload", {
              method: "POST",
              body: formData,
            });
            const data = await response.json();

            if (!response.ok) {
              showToast(data.error || "Book upload failed", true);
              return;
            }

            showToast("✅ Book uploaded successfully to server!");
            this.reset();
            base64Image = "";
            preview.style.display = "none";
            dropZone.querySelector("span").innerText = "Click to upload cover image";
            setTimeout(() => {
              window.location.href = "admin.html";
            }, 900);
          } catch (error) {
            console.warn("Server communication error, utilizing sandbox engine...", error);
            
            const fallbackBook = {
              id: Date.now(),
              title: titleVal,
              author: authorVal,
              isbn: isbnVal,
              category: categoryVal,
              description: descriptionVal,
              image: base64Image || "https://via.placeholder.com/120x170?text=No+Cover",
              dateAdded: new Date().toLocaleDateString(),
            };

            let library = JSON.parse(localStorage.getItem("lhabgay_allBooks")) || [];
            library.push(fallbackBook);
            localStorage.setItem("lhabgay_allBooks", JSON.stringify(library));

            showToast("✨ Saved locally to Sandbox! ISBN: " + fallbackBook.isbn, false);
            
            this.reset();
            base64Image = "";
            preview.style.display = "none";
            dropZone.querySelector("span").innerText = "Click to upload cover image";
          }
        });
    </script>
  </body>
</html>
